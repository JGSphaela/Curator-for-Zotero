name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI
        run: uv publish
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
