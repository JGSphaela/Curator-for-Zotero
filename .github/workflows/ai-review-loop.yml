name: AI review loop

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  schedule:
    # GitHub Actions does not expose a standard reaction-created trigger.
    # Polling lets us notice Codex's thumbs-up completion signal when PR review is enabled.
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to process. If empty, all open PRs are checked."
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ai-review-loop-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  ai-review-loop:
    name: Drive Codex/opencode review loop
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'issue_comment' ||
      github.event.issue.pull_request
    env:
      MAX_ITERATIONS: "${{ vars.AI_REVIEW_MAX_ITERATIONS || '5' }}"

      # Feature toggles. All default to off; opt in per repository.
      ENABLE_PR_REVIEW: "${{ vars.AI_REVIEW_ENABLE_PR_REVIEW || 'false' }}"
      ENABLE_ISSUE_REVIEW: "${{ vars.AI_REVIEW_ENABLE_ISSUE_REVIEW || 'false' }}"
      ENABLE_OPENCODE_PR_FIX: "${{ vars.AI_REVIEW_ENABLE_OPENCODE_PR_FIX || 'false' }}"
      SHOW_STATE_COMMENT: "${{ vars.AI_REVIEW_SHOW_STATE_COMMENT || 'false' }}"

      # Optional comma/space-separated GitHub logins. Empty means no login filter.
      PR_LOGIN_FILTER: "${{ vars.AI_REVIEW_PR_LOGIN_FILTER }}"
      ISSUE_LOGIN_FILTER: "${{ vars.AI_REVIEW_ISSUE_LOGIN_FILTER }}"
      OPENCODE_FIX_LOGIN_FILTER: "${{ vars.AI_REVIEW_OPENCODE_FIX_LOGIN_FILTER }}"

      # Agent choices for enabled features: codex, opencode, or none.
      PR_REVIEW_AGENT: "${{ vars.AI_REVIEW_PR_AGENT || 'codex' }}"
      ISSUE_REVIEW_AGENT: "${{ vars.AI_REVIEW_ISSUE_AGENT || 'opencode' }}"

      # Override these repository variables if a repo needs different prompts/commands.
      CODEX_PR_REVIEW_COMMAND: "${{ vars.AI_REVIEW_CODEX_PR_REVIEW_COMMAND || '@codex review' }}"
      OPENCODE_PR_REVIEW_COMMAND: "${{ vars.AI_REVIEW_OPENCODE_PR_REVIEW_COMMAND || '/oc review this PR' }}"
      CODEX_ISSUE_REVIEW_COMMAND: "${{ vars.AI_REVIEW_CODEX_ISSUE_REVIEW_COMMAND || '@codex review' }}"
      OPENCODE_ISSUE_COMMAND: "${{ vars.AI_REVIEW_OPENCODE_ISSUE_COMMAND || '/oc' }}"
      OPENCODE_FIX_COMMAND: "${{ vars.AI_REVIEW_OPENCODE_FIX_COMMAND || '/oc fix this' }}"
      RESTART_COMMAND: "${{ vars.AI_REVIEW_RESTART_COMMAND || '/ai-review-loop restart' }}"
      DISABLED_LABEL: "${{ vars.AI_REVIEW_DISABLED_LABEL || 'ai-review-loop-disabled' }}"
      STATE_COMMENT_MARKER: "<!-- ai-review-loop-state:"

    steps:
      - name: Advance AI review loop
        uses: actions/github-script@v7
        with:
          # Recommended: set repository secret AI_REVIEW_LOOP_TOKEN to a fine-grained
          # token that can read/write pull requests and issues. Some bot integrations ignore
          # comments authored by the default GITHUB_TOKEN; this falls back when no secret exists.
          github-token: ${{ secrets.AI_REVIEW_LOOP_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const maxIterations = Number(process.env.MAX_ITERATIONS || "5");
            const enablePrReview = parseBoolean(process.env.ENABLE_PR_REVIEW || "false");
            const enableIssueReview = parseBoolean(process.env.ENABLE_ISSUE_REVIEW || "false");
            const enableOpencodePrFix = parseBoolean(process.env.ENABLE_OPENCODE_PR_FIX || "false");
            const showStateComment = parseBoolean(process.env.SHOW_STATE_COMMENT || "false");
            const prLoginFilter = parseLoginFilter(process.env.PR_LOGIN_FILTER || "");
            const issueLoginFilter = parseLoginFilter(process.env.ISSUE_LOGIN_FILTER || "");
            const opencodeFixLoginFilter = parseLoginFilter(process.env.OPENCODE_FIX_LOGIN_FILTER || "");
            const prReviewAgent = normalizeAgent(process.env.PR_REVIEW_AGENT || "codex", "PR_REVIEW_AGENT");
            const issueReviewAgent = normalizeAgent(process.env.ISSUE_REVIEW_AGENT || "opencode", "ISSUE_REVIEW_AGENT");
            const codexPrReviewCommand = process.env.CODEX_PR_REVIEW_COMMAND || "@codex review";
            const opencodePrReviewCommand = process.env.OPENCODE_PR_REVIEW_COMMAND || "/oc review this PR";
            const codexIssueReviewCommand = process.env.CODEX_ISSUE_REVIEW_COMMAND || "@codex review";
            const opencodeIssueCommand = process.env.OPENCODE_ISSUE_COMMAND || "/oc";
            const opencodeFixCommand = process.env.OPENCODE_FIX_COMMAND || "/oc fix this";
            const restartCommand = process.env.RESTART_COMMAND || "/ai-review-loop restart";
            const disabledLabel = process.env.DISABLED_LABEL || "ai-review-loop-disabled";
            const marker = process.env.STATE_COMMENT_MARKER || "<!-- ai-review-loop-state:";

            const codexBotLogins = new Set([
              "chatgpt-codex-connector[bot]",
              "chatgpt-codex-connector",
              "codex[bot]",
              "codex"
            ]);

            function normalizeAgent(value, name) {
              const agent = String(value || "none").trim().toLowerCase();
              if (["codex", "opencode", "none"].includes(agent)) return agent;
              core.warning(`${name}=${value} is invalid; expected codex, opencode, or none. Using none.`);
              return "none";
            }

            function parseBoolean(value) {
              return ["1", "true", "yes", "on"].includes(String(value || "").trim().toLowerCase());
            }

            function parseLoginFilter(value) {
              return new Set(
                String(value || "")
                  .split(/[\s,]+/)
                  .map(login => login.trim().toLowerCase())
                  .filter(Boolean)
              );
            }

            function loginMatches(filter, user) {
              if (filter.size === 0) return true;
              const login = (user?.login || "").toLowerCase();
              return Boolean(login && filter.has(login));
            }

            function filterLabel(filter) {
              return filter.size === 0 ? "all" : [...filter].join(", ");
            }

            function reviewCommandFor(kind, agent) {
              if (agent === "none") return null;
              if (kind === "pr" && agent === "codex") return codexPrReviewCommand;
              if (kind === "pr" && agent === "opencode") return opencodePrReviewCommand;
              if (kind === "issue" && agent === "codex") return codexIssueReviewCommand;
              if (kind === "issue" && agent === "opencode") return opencodeIssueCommand;
              return null;
            }

            function freshState() {
              return {
                version: 1,
                phase: "new",
                iteration: 0,
                lastHeadSha: null,
                lastReviewAgent: null,
                lastReviewRequestCommentId: null,
                lastReviewRequestedAt: null,
                lastCodexRequestCommentId: null,
                lastCodexRequestedAt: null,
                lastCodexReviewId: null,
                lastFixRequestedAt: null,
                completedAt: null,
                stoppedAt: null,
                stopReason: null
              };
            }

            function nowIso() {
              return new Date().toISOString();
            }

            function shortSha(sha) {
              return sha ? sha.slice(0, 12) : "unknown";
            }

            function isCodexUser(user) {
              return Boolean(user && codexBotLogins.has(user.login));
            }

            function isCodexSuggestionsReview(review) {
              if (!isCodexUser(review.user)) return false;
              if (review.state !== "COMMENTED") return false;
              const body = review.body || "";
              return /automated review suggestions/i.test(body) || /Codex Review/i.test(body);
            }

            function isRestartComment() {
              return context.eventName === "issue_comment" &&
                (context.payload.comment?.body || "").trim() === restartCommand;
            }

            function stateBody(state) {
              const compact = JSON.stringify(state);
              const hiddenState = `${marker}${compact} -->`;
              if (!showStateComment) return hiddenState;

              const details = [
                `phase: ${state.phase.replaceAll("_", " ")}`,
                `iteration: ${state.iteration}/${maxIterations}`,
                `head: ${shortSha(state.lastHeadSha)}`
              ];
              if (state.lastReviewAgent) details.push(`reviewer: ${state.lastReviewAgent}`);
              if (state.stopReason) details.push(`stop: ${state.stopReason}`);
              return `${hiddenState}\n🤖 AI review loop state — ${details.join(" · ")}`;
            }

            function parseState(body) {
              const start = body.indexOf(marker);
              if (start === -1) return null;
              const jsonStart = start + marker.length;
              const end = body.indexOf("-->", jsonStart);
              if (end === -1) return null;
              try {
                return { ...freshState(), ...JSON.parse(body.slice(jsonStart, end).trim()) };
              } catch (error) {
                core.warning(`Could not parse loop state comment: ${error.message}`);
                return null;
              }
            }

            async function paginate(method, params) {
              return await github.paginate(method, { owner, repo, per_page: 100, ...params });
            }

            async function getPull(prNumber) {
              const { data } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              return data;
            }

            async function listIssueComments(issueNumber) {
              return await paginate(github.rest.issues.listComments, { issue_number: issueNumber });
            }

            async function loadState(prNumber) {
              const comments = await listIssueComments(prNumber);
              const stateComment = [...comments].reverse().find(comment => parseState(comment.body || ""));
              return {
                state: stateComment ? parseState(stateComment.body || "") : freshState(),
                stateComment: stateComment || null
              };
            }

            async function saveState(prNumber, state, stateComment) {
              const body = stateBody(state);
              if (stateComment) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: stateComment.id, body });
                return stateComment;
              }
              const { data } = await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
              return data;
            }

            async function postComment(issueNumber, body) {
              const { data } = await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body });
              return data;
            }

            async function ensureDisabledLabel() {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: disabledLabel });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: disabledLabel,
                  color: "ededed",
                  description: "Disable automated Codex/opencode review loop for this issue or PR."
                });
              }
            }

            async function addDisabledLabel(issueNumber) {
              await ensureDisabledLabel();
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: [disabledLabel]
              });
            }

            async function removeDisabledLabel(issueNumber) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  name: disabledLabel
                });
              } catch (error) {
                if (error.status === 404) {
                  core.info(`#${issueNumber}: ${disabledLabel} was not present.`);
                  return;
                }
                throw error;
              }
            }

            function hasDisabledLabel(item) {
              return (item.labels || []).some(label => label.name === disabledLabel);
            }

            async function requestIssueReview(issue) {
              if (!enableIssueReview) {
                core.info(`Issue review disabled by AI_REVIEW_ENABLE_ISSUE_REVIEW=false.`);
                return;
              }

              if (!issue || issue.pull_request) {
                core.info("Skipping because this is not a plain issue.");
                return;
              }

              if (!loginMatches(issueLoginFilter, issue.user)) {
                core.info(`#${issue.number}: issue login filter did not match (${filterLabel(issueLoginFilter)}).`);
                return;
              }

              if (hasDisabledLabel(issue)) {
                core.info(`#${issue.number}: skipped because it has ${disabledLabel}.`);
                return;
              }

              const command = reviewCommandFor("issue", issueReviewAgent);
              if (!command) {
                core.info(`#${issue.number}: issue review disabled by ISSUE_REVIEW_AGENT=${issueReviewAgent}.`);
                return;
              }

              const comments = await listIssueComments(issue.number);
              if (comments.some(comment => (comment.body || "").trim() === command)) {
                core.info(`#${issue.number}: ${command} was already posted.`);
                return;
              }

              await postComment(issue.number, command);
              core.info(`#${issue.number}: requested ${issueReviewAgent} issue review.`);
            }

            async function requestPrReview(prNumber, pr, state, stateComment) {
              const command = reviewCommandFor("pr", prReviewAgent);
              if (!command) {
                state.phase = "complete";
                state.lastHeadSha = pr.head.sha;
                state.lastReviewAgent = "none";
                state.completedAt = nowIso();
                state.stoppedAt = null;
                state.stopReason = null;
                stateComment = await saveState(prNumber, state, stateComment);
                core.info(`#${prNumber}: PR review disabled by PR_REVIEW_AGENT=${prReviewAgent}.`);
                return { state, stateComment };
              }

              if (state.phase === "waiting_codex" && state.lastHeadSha === pr.head.sha && state.lastReviewAgent === "codex") {
                core.info(`#${prNumber}: Codex review already pending for ${shortSha(pr.head.sha)}.`);
                return { state, stateComment };
              }

              const comment = await postComment(prNumber, command);
              state.lastHeadSha = pr.head.sha;
              state.lastReviewAgent = prReviewAgent;
              state.lastReviewRequestCommentId = comment.id;
              state.lastReviewRequestedAt = nowIso();
              state.completedAt = null;
              state.stoppedAt = null;
              state.stopReason = null;

              if (prReviewAgent === "codex") {
                state.phase = "waiting_codex";
                state.lastCodexRequestCommentId = comment.id;
                state.lastCodexRequestedAt = state.lastReviewRequestedAt;
              } else {
                state.phase = "complete";
                state.completedAt = nowIso();
              }

              stateComment = await saveState(prNumber, state, stateComment);
              core.info(`#${prNumber}: requested ${prReviewAgent} PR review for ${shortSha(pr.head.sha)}.`);
              return { state, stateComment };
            }

            async function requestOpencodeFix(prNumber, pr, state, stateComment, review) {
              if (state.lastCodexReviewId === review.id && state.phase === "waiting_fix") {
                core.info(`#${prNumber}: opencode fix already pending for Codex review ${review.id}.`);
                return { state, stateComment };
              }

              if (!enableOpencodePrFix) {
                state.phase = "stopped";
                state.stoppedAt = nowIso();
                state.stopReason = "Codex returned suggestions, but ENABLE_OPENCODE_PR_FIX=false.";
                state.lastCodexReviewId = review.id;
                stateComment = await saveState(prNumber, state, stateComment);
                await postComment(
                  prNumber,
                  `🛑 Codex returned suggestions, but automatic opencode fixing is disabled. Comment \`${restartCommand}\` after handling feedback to restart the review loop.`
                );
                core.info(`#${prNumber}: stopped because opencode PR fixing is disabled.`);
                return { state, stateComment };
              }

              if (!loginMatches(opencodeFixLoginFilter, pr.user)) {
                state.phase = "stopped";
                state.stoppedAt = nowIso();
                state.stopReason = "Codex returned suggestions, but the PR login filter does not allow opencode auto-fix.";
                state.lastCodexReviewId = review.id;
                stateComment = await saveState(prNumber, state, stateComment);
                await postComment(
                  prNumber,
                  `🛑 Codex returned suggestions, but automatic opencode fixing is not enabled for this PR. Comment \`${restartCommand}\` after handling feedback to restart the review loop.`
                );
                core.info(`#${prNumber}: stopped because opencode fix login filter did not match (${filterLabel(opencodeFixLoginFilter)}).`);
                return { state, stateComment };
              }

              if (state.iteration >= maxIterations) {
                await addDisabledLabel(prNumber);
                state.phase = "stopped";
                state.stoppedAt = nowIso();
                state.stopReason = `Reached MAX_ITERATIONS=${maxIterations}; added ${disabledLabel}.`;
                state.lastCodexReviewId = review.id;
                stateComment = await saveState(prNumber, state, stateComment);
                await postComment(
                  prNumber,
                  `🛑 AI review loop stopped after ${maxIterations} fix attempts and added ${disabledLabel}. Codex is still returning suggestions, so this needs human review. Comment \`${restartCommand}\` to remove the label and restart the loop.`
                );
                core.warning(`#${prNumber}: stopped at iteration limit and added ${disabledLabel}.`);
                return { state, stateComment };
              }

              await postComment(prNumber, opencodeFixCommand);
              state.phase = "waiting_fix";
              state.iteration += 1;
              state.lastHeadSha = pr.head.sha;
              state.lastCodexReviewId = review.id;
              state.lastFixRequestedAt = nowIso();
              stateComment = await saveState(prNumber, state, stateComment);
              core.info(`#${prNumber}: requested opencode fix attempt ${state.iteration}/${maxIterations}.`);
              return { state, stateComment };
            }

            async function markComplete(prNumber, pr, state, stateComment) {
              if (state.phase === "complete" && state.lastHeadSha === pr.head.sha) {
                return { state, stateComment };
              }
              state.phase = "complete";
              state.lastHeadSha = pr.head.sha;
              state.completedAt = nowIso();
              state.stoppedAt = null;
              state.stopReason = null;
              stateComment = await saveState(prNumber, state, stateComment);
              await postComment(prNumber, `✅ Codex returned 👍 for ${shortSha(pr.head.sha)}. AI review loop complete.`);
              core.info(`#${prNumber}: Codex returned thumbs up.`);
              return { state, stateComment };
            }

            async function codexThumbedUpRequest(state) {
              if (!state.lastCodexRequestCommentId) return false;
              const reactions = await paginate(github.rest.reactions.listForIssueComment, {
                comment_id: state.lastCodexRequestCommentId,
                content: "+1"
              });
              return reactions.some(reaction => isCodexUser(reaction.user));
            }

            async function latestCodexSuggestionsReviewAfter(prNumber, state) {
              if (!state.lastCodexRequestedAt) return null;
              const requestedAt = new Date(state.lastCodexRequestedAt).getTime();
              const reviews = await paginate(github.rest.pulls.listReviews, { pull_number: prNumber });
              return reviews
                .filter(isCodexSuggestionsReview)
                .filter(review => new Date(review.submitted_at || 0).getTime() >= requestedAt)
                .sort((a, b) => new Date(b.submitted_at || 0) - new Date(a.submitted_at || 0))[0] || null;
            }

            async function processPr(prNumber, reason) {
              const pr = await getPull(prNumber);
              let { state, stateComment } = await loadState(prNumber);
              core.info(`#${prNumber}: reason=${reason}; phase=${state.phase}; head=${shortSha(pr.head.sha)}; enablePrReview=${enablePrReview}; enableIssueReview=${enableIssueReview}; prReviewAgent=${prReviewAgent}; issueReviewAgent=${issueReviewAgent}; enableOpencodePrFix=${enableOpencodePrFix}; showStateComment=${showStateComment}; prLoginFilter=${filterLabel(prLoginFilter)}; fixLoginFilter=${filterLabel(opencodeFixLoginFilter)}.`);

              if (pr.state !== "open") return;

              if (!enablePrReview) {
                core.info(`#${prNumber}: PR review disabled by AI_REVIEW_ENABLE_PR_REVIEW=false.`);
                return;
              }

              if (!loginMatches(prLoginFilter, pr.user)) {
                core.info(`#${prNumber}: PR login filter did not match (${filterLabel(prLoginFilter)}).`);
                return;
              }

              if (isRestartComment()) {
                await removeDisabledLabel(prNumber);
                state = freshState();
                ({ state, stateComment } = await requestPrReview(prNumber, pr, state, stateComment));
                await postComment(prNumber, `🔄 AI review loop restarted by \`${restartCommand}\`.`);
                return;
              }

              if (context.eventName === "issue_comment") {
                core.info(`#${prNumber}: ignoring non-restart issue comment.`);
                return;
              }

              if (pr.draft) {
                state.phase = "stopped";
                state.stoppedAt = nowIso();
                state.stopReason = "Draft PRs are skipped until ready for review.";
                await saveState(prNumber, state, stateComment);
                return;
              }

              if (hasDisabledLabel(pr)) {
                state.phase = "stopped";
                state.stoppedAt = nowIso();
                state.stopReason = `Disabled by label ${disabledLabel}.`;
                await saveState(prNumber, state, stateComment);
                return;
              }

              if (state.phase === "stopped") {
                if (reason === "ready_for_review" && state.stopReason === "Draft PRs are skipped until ready for review.") {
                  core.info(`#${prNumber}: PR is ready for review; resuming loop from draft stop.`);
                  state = freshState();
                  stateComment = await saveState(prNumber, state, stateComment);
                } else {
                  core.info(`#${prNumber}: loop is stopped. Comment ${restartCommand} to restart.`);
                  return;
                }
              }

              if (state.phase === "waiting_codex") {
                if (prReviewAgent !== "codex") {
                  core.info(`#${prNumber}: waiting_codex state ignored because PR_REVIEW_AGENT=${prReviewAgent}.`);
                  return;
                }

                if (await codexThumbedUpRequest(state)) {
                  await markComplete(prNumber, pr, state, stateComment);
                  return;
                }

                const review = await latestCodexSuggestionsReviewAfter(prNumber, state);
                if (review && state.lastCodexReviewId !== review.id) {
                  await requestOpencodeFix(prNumber, pr, state, stateComment, review);
                  return;
                }
              }

              if (state.phase === "waiting_fix") {
                if (state.lastHeadSha && state.lastHeadSha !== pr.head.sha) {
                  await requestPrReview(prNumber, pr, state, stateComment);
                } else {
                  core.info(`#${prNumber}: waiting for opencode to push a fix.`);
                }
                return;
              }

              if (["new", "complete"].includes(state.phase)) {
                if (state.lastHeadSha !== pr.head.sha || state.phase !== "complete") {
                  await requestPrReview(prNumber, pr, state, stateComment);
                }
                return;
              }

              if (state.lastHeadSha !== pr.head.sha) {
                await requestPrReview(prNumber, pr, state, stateComment);
              }
            }

            async function openPullRequests() {
              return await paginate(github.rest.pulls.list, {
                state: "open",
                sort: "updated",
                direction: "desc"
              });
            }

            async function main() {
              const eventName = context.eventName;
              core.info(`event=${eventName}`);

              if (eventName === "issues") {
                await requestIssueReview(context.payload.issue);
                return;
              }

              if (eventName === "workflow_dispatch") {
                const inputPr = (context.payload.inputs?.pr_number || "").trim();
                if (inputPr) {
                  await processPr(Number(inputPr), "manual dispatch");
                } else {
                  for (const pr of await openPullRequests()) await processPr(pr.number, "manual dispatch sweep");
                }
                return;
              }

              if (eventName === "schedule") {
                for (const pr of await openPullRequests()) await processPr(pr.number, "scheduled sweep");
                return;
              }

              const prNumber = context.payload.pull_request?.number || context.payload.issue?.number;
              if (!prNumber) {
                core.info("No pull request number in event; nothing to do.");
                return;
              }
              await processPr(prNumber, eventName);
            }

            await main();
