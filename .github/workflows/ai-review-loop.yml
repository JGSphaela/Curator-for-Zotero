name: AI review loop

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: Optional PR number. Empty checks all open PRs.
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review-loop:
    uses: labsphaela/ai-review-automation/.github/workflows/ai-review-loop.yml@v1
    with:
      pr_number: ${{ inputs.pr_number || '' }}
      max_iterations: ${{ fromJSON(vars.AI_REVIEW_MAX_ITERATIONS || '5') }}
      enable_pr_review: ${{ fromJSON(vars.AI_REVIEW_ENABLE_PR_REVIEW || 'false') }}
      enable_issue_review: ${{ fromJSON(vars.AI_REVIEW_ENABLE_ISSUE_REVIEW || 'false') }}
      enable_opencode_pr_fix: ${{ fromJSON(vars.AI_REVIEW_ENABLE_OPENCODE_PR_FIX || 'false') }}
      show_state_comment: ${{ fromJSON(vars.AI_REVIEW_SHOW_STATE_COMMENT || 'false') }}
      pr_login_filter: ${{ vars.AI_REVIEW_PR_LOGIN_FILTER || '' }}
      issue_login_filter: ${{ vars.AI_REVIEW_ISSUE_LOGIN_FILTER || '' }}
      opencode_fix_login_filter: ${{ vars.AI_REVIEW_OPENCODE_FIX_LOGIN_FILTER || '' }}
      pr_review_agent: ${{ vars.AI_REVIEW_PR_AGENT || 'codex' }}
      issue_review_agent: ${{ vars.AI_REVIEW_ISSUE_AGENT || 'opencode' }}
      codex_pr_review_command: ${{ vars.AI_REVIEW_CODEX_PR_REVIEW_COMMAND || '@codex review' }}
      opencode_pr_review_command: ${{ vars.AI_REVIEW_OPENCODE_PR_REVIEW_COMMAND || '/oc review this PR' }}
      codex_issue_review_command: ${{ vars.AI_REVIEW_CODEX_ISSUE_REVIEW_COMMAND || '@codex review' }}
      opencode_issue_command: ${{ vars.AI_REVIEW_OPENCODE_ISSUE_COMMAND || '/oc' }}
      opencode_fix_command: ${{ vars.AI_REVIEW_OPENCODE_FIX_COMMAND || '/oc fix this' }}
      restart_command: ${{ vars.AI_REVIEW_RESTART_COMMAND || '/ai-review-loop restart' }}
      disabled_label: ${{ vars.AI_REVIEW_DISABLED_LABEL || 'ai-review-loop-disabled' }}
    secrets:
      AI_REVIEW_LOOP_TOKEN: ${{ secrets.AI_REVIEW_LOOP_TOKEN }}
