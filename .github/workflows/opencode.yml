name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  opencode:
    if: >-
      github.event.comment.user.type != 'Bot' &&
      (
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/opencode') ||
        contains(github.event.comment.body, ' /opencode')
      )
    uses: labsphaela/ai-review-automation/.github/workflows/opencode.yml@v1
    with:
      model: ${{ vars.OPENCODE_MODEL || 'opencode/deepseek-v4-flash-free' }}
      variant: ${{ vars.OPENCODE_VARIANT || 'max' }}
      agent: ${{ vars.OPENCODE_AGENT || '' }}
      prompt: ${{ vars.OPENCODE_PROMPT || '' }}
      mentions: ${{ vars.OPENCODE_MENTIONS || '/opencode,/oc' }}
      share: ${{ fromJSON(vars.OPENCODE_SHARE || 'false') }}
      use_github_token: ${{ fromJSON(vars.OPENCODE_USE_GITHUB_TOKEN || 'false') }}
      oidc_base_url: ${{ vars.OPENCODE_OIDC_BASE_URL || '' }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
