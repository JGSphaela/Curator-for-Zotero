name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  id-token: write
  contents: read
  pull-requests: read
  issues: read

jobs:
  opencode:
    uses: JGSphaela/ai-review-automation/.github/workflows/opencode.yml@v1
    with:
      model: ${{ vars.OPENCODE_MODEL || 'opencode/deepseek-v4-flash-free' }}
      variant: ${{ vars.OPENCODE_VARIANT || 'max' }}
